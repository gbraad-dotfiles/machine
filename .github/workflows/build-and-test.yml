name: Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  DUCTTAPE_PROVISIONER: "lima"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ducttape tool
        uses: actions/checkout@v4
        with:
          repository: ducttape-infra/ducttape
          path: .

      - name: Checkout examples repo
        uses: actions/checkout@v4
        with:
          repository: ducttape-infra/examples
          path: examples

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Add dependencies
        shell: sudo bash {0}
        run: |
          apt update && apt install -y libgpgme-dev libbtrfs-dev sshpass

      - name: virtualization support
        continue-on-error: true
        uses: gbraad-actions/setup-virtualization@v3

      - name: Install containers tools (optional)
        continue-on-error: true
        uses: gbraad-actions/setup-container-tools@v1

      - uses: lima-vm/lima-actions/setup@v1
        id: lima-actions-setup

      - name: Initialize and tidy go module
        run: |
          go mod tidy
          go mod vendor

      - name: Build ducttape binary
        run: |
          go version
          make
          ls -l out/

      - name: Verify binary builds & shows help
        run: |
          echo "=== ducttape --help ==="
          ./out/ducttape --help
          echo "=== ducttape build --help ==="
          ./out/ducttape build --help
          echo "=== ducttape run --help ==="
          ./out/ducttape run --help

      - name: Build image with ducttape
        id: build-image
        env:
          IMAGE_TAG: fedora-httpd
        run: |
          echo "Building image with:"
          echo "  IMAGE_TAG: $IMAGE_TAG"
          echo "  Machinefile: examples/fedora-httpd/Machinefile.httpd"
          echo "  Base image (-d): fedora-cloud (alias -> HTTPS download -> qcow2)"

          ./out/ducttape build -t "$IMAGE_TAG" -f examples/fedora-httpd/Machinefile.httpd -d fedora-cloud:42 --root-pass password

          # Verify the image was created
          echo "=== Listing images after build ==="
          ./out/ducttape images
          ls -la ~/.local/share/ducttape/images/
          echo "Built image $IMAGE_TAG"

      - name: Run VM from built image
        env:
          IMAGE_TAG: fedora-httpd
          VM_NAME: fedora-httpd
        run: |
          echo "Running VM from $IMAGE_TAG..."
          ./out/ducttape run "$IMAGE_TAG" --name "$VM_NAME"

          echo "Waiting for SSH..."
          for i in $(seq 1 30); do
            ./out/ducttape shell "$VM_NAME" true 2>/dev/null && break
            sleep 10
          done
          echo "VM ready."

          echo "=== Verify httpd ==="
          ./out/ducttape shell "$VM_NAME" sudo systemctl status httpd --no-pager 2>&1 | head -10

          echo "=== Verify page ==="
          ./out/ducttape shell "$VM_NAME" curl -s http://localhost/ 2>&1 | head -5

          echo "=== Stop and clean VM ==="
          ./out/ducttape stop "$VM_NAME"
          ./out/ducttape rm "$VM_NAME" || true

      - name: Push image to registry
        env:
          IMAGE_TAG: fedora-httpd
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pushing image..."
          ./out/ducttape push fedora-httpd

      - name: Build derived image (FROM fedora-httpd)
        env:
          ROOT_PASS: password
        run: |
          echo "=== Derived build ==="
          ./out/ducttape build -t derived-httpd -f examples/fedora-httpd/Machinefile.derived --root-pass "$ROOT_PASS"

          echo "=== Run derived ==="
          ./out/ducttape run derived-httpd --name test-derived

          echo "=== Verify page ==="
          for i in $(seq 1 30); do
            ./out/ducttape shell test-derived true 2>/dev/null && break
            sleep 5
          done
          ./out/ducttape shell test-derived curl -s http://localhost/ 2>&1 | head -5

          echo "=== Clean derived ==="
          ./out/ducttape stop test-derived
          ./out/ducttape rm test-derived || true

      - name: Upload ducttape binary

        uses: actions/upload-artifact@v4
        with:
          name: ducttape-linux-amd64
          path: out/ducttape
